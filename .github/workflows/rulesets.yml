name: rulesets

# Rulesets as code. Every *.json under .github/rulesets/ is applied to this repo,
# idempotently: a ruleset with the same name is updated in place, otherwise created.
# This is the no-Enterprise way to manage repo protection declaratively - drop this
# file plus a .github/rulesets/ folder into any repo and it self-applies.
#
# Token: managing rulesets requires admin, and the built-in GITHUB_TOKEN can NOT be
# granted that (the `permissions:` block has no `administration` scope). So this
# needs a fine-grained PAT with "Administration: read and write" on the repo, stored
# as the RULESETS_TOKEN secret. Without it, the job warns and skips (stays green).

on:
  push:
    branches: [main]
    paths:
      - ".github/rulesets/**"
      - ".github/workflows/rulesets.yml"
  workflow_dispatch:
  # Reusable: other repos call this with `uses:` + `secrets: inherit`. checkout
  # then reads the *caller* repo's .github/rulesets/ and applies to the caller.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: rulesets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Apply rulesets
        env:
          GH_TOKEN: ${{ secrets.RULESETS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning title=RULESETS_TOKEN not set::Add a fine-grained PAT with \
            Administration: read and write as the RULESETS_TOKEN secret to sync rulesets. \
            GITHUB_TOKEN cannot manage rulesets. Skipping."
            exit 0
          fi

          shopt -s nullglob
          files=(.github/rulesets/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No rulesets under .github/rulesets/ - nothing to do."
            exit 0
          fi

          # Snapshot existing rulesets once (name -> id).
          existing="$(gh api "repos/$REPO/rulesets" --paginate)"

          for f in "${files[@]}"; do
            name="$(jq -r '.name' "$f")"
            id="$(jq -r --arg n "$name" '.[] | select(.name==$n) | .id' <<<"$existing" | head -1)"
            echo "::group::$name ($f)"
            if [ -n "$id" ] && [ "$id" != "null" ]; then
              echo "Updating existing ruleset #$id"
              gh api -X PUT "repos/$REPO/rulesets/$id" --input "$f" --jq '.name + ": " + .enforcement'
            else
              echo "Creating ruleset"
              gh api -X POST "repos/$REPO/rulesets" --input "$f" --jq '.name + ": " + .enforcement'
            fi
            echo "::endgroup::"
          done
