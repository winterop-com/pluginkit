site_name: pluginkit
site_description: A small, dependency-free plugin framework - hook specs, entry-point discovery, and sync/async dispatch
site_url: https://winterop-com.github.io/pluginkit/
repo_url: https://github.com/winterop-com/pluginkit
repo_name: winterop-com/pluginkit

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Concepts:
      - Overview: concepts/overview.md
      - Specs and implementations: concepts/specs-and-impls.md
      - The plugin manager: concepts/plugin-manager.md
      - Calling conventions: concepts/calling-conventions.md
  - Mechanisms:
      - Direct registration: mechanisms/direct.md
      - First result: mechanisms/firstresult.md
      - Ordering: mechanisms/ordering.md
      - Wrappers: mechanisms/wrappers.md
      - Pipeline dispatch: mechanisms/pipeline.md
      - Historic hooks: mechanisms/historic.md
      - Entry-point discovery: mechanisms/entrypoints.md
  - Production:
      - Hardening notes: production/hardening.md
      - Lifecycle and validation: production/lifecycle.md
      - Async dispatch: production/async.md
      - Differences from pluggy: production/vs-pluggy.md
  - Integrations:
      - FastAPI: integrations/fastapi.md
  - API Reference: api-reference.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src, examples/tour/src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            members_order: source
            heading_level: 2
